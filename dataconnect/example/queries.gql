mutation CreateUserAccount($email: String!, $fullName: String!) @auth(level: PUBLIC) {
  user_insert(data: {
    email: $email,
    fullName: $fullName,
    createdAt_expr: "request.time"
  })
}

mutation CreateNewMemory($type: String!, $title: String, $description: String) @auth(level: USER) {
  memory_insert(data: {
    type: $type,
    title: $title,
    description: $description,
    ownerId_expr: "auth.uid",
    createdAt_expr: "request.time"
  })
}

query GetUserDocuments @auth(level: USER) {
  documents(where: {ownerId: {eq_expr: "auth.uid"}}) {
    title
    fileUrl
    category
  }
}

mutation CreateLegacyMessage($content: String!, $recipientEmail: String!) @auth(level: USER) {
  legacyMessage_insert(data: {
    content: $content,
    recipientEmail: $recipientEmail,
    status: "pending",
    ownerId_expr: "auth.uid"
  })
}